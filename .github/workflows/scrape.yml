name: Opta Tracker

on:
  schedule:
    - cron: '0 * * * *'      # scrape cada hora
    - cron: '*/10 * * * *'   # resultados cada 10 minutos
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    if: github.event.schedule == '0 * * * *' || github.event_name == 'workflow_dispatch'
    steps:

      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install playwright openpyxl
          playwright install chromium --with-deps

      - name: Run scraper
        run: python run.py scrape
        env:
          API_FOOTBALL_KEY: ${{ secrets.API_FOOTBALL_KEY }}

      - name: Commit updated data + dashboard
        run: |
          git config user.name  "Opta Tracker Bot"
          git config user.email "bot@opta-tracker"
          git fetch origin main
          git merge -X ours origin/main --no-edit 2>/dev/null || true
          git add opta_tracker.db
          git add docs/index.html docs/history.html 2>/dev/null || true
          git diff --staged --quiet || git commit -m "scrape $(date -u +%Y-%m-%dT%H:%M)"
          git push

  results:
    runs-on: ubuntu-latest
    if: github.event.schedule == '*/10 * * * *'
    steps:

      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies (sin Chromium — results no usa browser)
        run: pip install playwright openpyxl

      - name: Update results + regenerate dashboard
        run: python run.py results && python report.py
        env:
          API_FOOTBALL_KEY: ${{ secrets.API_FOOTBALL_KEY }}

      - name: Commit results + dashboard
        run: |
          git config user.name  "Opta Tracker Bot"
          git config user.email "bot@opta-tracker"
          git fetch origin main
          git merge -X ours origin/main --no-edit 2>/dev/null || true
          git add opta_tracker.db
          git add docs/index.html docs/history.html 2>/dev/null || true
          git diff --staged --quiet || git commit -m "results $(date -u +%Y-%m-%dT%H:%M)"
          git push
